global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: researchops
    environment: lab

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets:
          - submit-node:9100
          - central-manager:9100
          - execute-node-1:9100
          - execute-node-2:9100
          - nfs-server:9100
          - monitoring:9100

  - job_name: htcondor
    static_configs:
      - targets: ['central-manager:9313']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: proxmox-host
    static_configs:
      - targets:
          - 192.168.1.235:9100
