groups:
  - name: researchops-slo
    rules:
      - record: htcondor:job_submission_success_rate:30m
        expr: |
          increase(htcondor_schedd_jobs_completed_total[30m])
          /
          (
            increase(htcondor_schedd_jobs_completed_total[30m])
            + increase(htcondor_schedd_jobs_failed_total[30m])
            + 0.0001
          )

      - record: htcondor:error_budget_remaining:30d
        expr: |
          1 - ((1 - htcondor:job_submission_success_rate:30m) / (1 - 0.995))

      - record: node:cpu_usage:5m
        expr: |
          100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])))

      - record: node:memory_usage:current
        expr: |
          100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))

      - record: node:disk_usage:current
        expr: |
          100 * (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}))
