---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - vim
      - htop
      - net-tools
      - python3
      - python3-pip
      - gnupg
      - ca-certificates
    state: present

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}.researchops.local"

- name: Add all lab hosts to /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "{{ item }}"
    state: present
  loop:
    - "10.0.0.10  submit-node submit-node.researchops.local"
    - "10.0.0.11  central-manager central-manager.researchops.local"
    - "10.0.0.12  execute-node-1 execute-node-1.researchops.local"
    - "10.0.0.13  execute-node-2 execute-node-2.researchops.local"
    - "10.0.0.14  nfs-server nfs-server.researchops.local"
    - "10.0.0.15  monitoring monitoring.researchops.local"
